name: Update and Deploy

on:
  schedule:
    - cron: '0 15 * * *'  # 譌･譛ｬ譎る俣 蜊亥燕0譎・
  push:
    branches: ["main"]
    paths:
      - "assets/**"
      - "_layouts/**"
      - "_includes/**"
      - "index.md"
      - "list.md"
      - "_config.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 笏笏 Job 1: 繝・・繧ｿ譖ｴ譁ｰ・医せ繧ｱ繧ｸ繝･繝ｼ繝ｫ繝ｻ謇句虚譎ゅ・縺ｿ螳溯｡鯉ｼ俄楳笏笏笏笏笏
  update:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Run scraping script
        run: python _scripts/update_data.py

      - name: Commit and Push
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/politicians.csv
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Update politician data [skip ci]"
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  # 笏笏 Job 2: Jekyll 繝薙Ν繝会ｼ・ョ繝励Ο繧､ 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
  build-and-deploy:
    runs-on: ubuntu-latest
    # update job 縺悟ｭ伜惠縺吶ｋ蝣ｴ蜷医・縺昴・螳御ｺ・ｒ蠕・▽
    needs: [update]
    # update 縺・skipped 縺ｾ縺溘・謌仙粥縺励◆蝣ｴ蜷医・縺ｿ螳溯｡・
    if: |
      always() &&
      (needs.update.result == 'success' || needs.update.result == 'skipped')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # update job 縺・CSV 繧偵・繝・す繝･縺励◆蠕後・譛譁ｰ繧貞叙蠕・
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4