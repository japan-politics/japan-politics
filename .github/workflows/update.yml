name: Daily Politician Data Update

on:
  schedule:
    - cron: '0 15 * * *' # 日本時間 午前0時
  push:
    branches:
      - main
  workflow_dispatch: # 手動実行ボタン

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴を取得してコンフリクトを防止

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Run scraping script
        run: |
          # 実行ログを見やすく出力
          python update_data.py
          echo "Scraping finished."

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/politicians.csv
          # 差分がある場合のみコミット
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Update politician data [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi