name: Daily Politician Data Update

on:
  schedule:
    # 毎日 日本時間 午前0時 (UTC 15:00) に実行
    - cron: '0 15 * * *'
  push:
    branches:
      - main  # mainブランチにPushされたら実行
  workflow_dispatch: # ボタン一つで手動実行も可能にする

jobs:
  update:
    runs-on: ubuntu-latest
# .github/workflows/update.yml の permissions 部分を修正
    permissions:
      contents: write
      pages: write      # デプロイ用に必要
      id-token: write   # デプロイ用に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Run scraping script
        run: python update_data.py

      - name: Commit and Push if changes exist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/politicians.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update politician data" && git push)