title: 日本の政治
description: 衆議院・参議院の議員情報を自動更新するプロジェクト

baseurl: ""
url: "https://japan-politics.github.io"

kramdown:
  input: GFM

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-github-metadata

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

exclude:
  - README.md
  - vendor/
  - test_output.txt