<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>{{ page.title }} | 日本国会議員データベース</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1a365d;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: "Inter", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* ヘッダー：シンメトリーで安定感のあるデザイン */
        header {
            background-color: var(--primary);
            color: white;
            padding: 1.25rem 0;
            border-bottom: 4px solid #d4af37; /* ゴールドの細い線で格式を演出 */
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        header a { color: white; text-decoration: none; }

        /* コンテンツエリア：余白を広く取り、情報の「呼吸」を助ける */
        main {
            max-width: 1100px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.25rem;
            border-left: 6px solid var(--primary);
            padding-left: 1rem;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        footer {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-sub);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        /* プロ仕様のボタンデザイン */
        .btn-primary {
            display: inline-block;
            background: var(--primary);
            color: white !important;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(26, 54, 93, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(26, 54, 93, 0.3);
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ '/' | relative_url }}">日本国会議員データベース / ARCHIVE</a></h1>
    </header>
    <main>
        {{ content }}
    </main>
    <footer>
        &copy; 2026 Japan Parliamentary Database<br>
        <span style="font-size: 0.7rem;">Official data compiled and updated via automated systems.</span>
    </footer>
</body>
</html>
