<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>{{ page.title }} | 日本国会議員データベース</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #1a365d;
            --bg-color: #f1f5f9;
        }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; color: #1e293b; }
        header { background: var(--primary-color); color: white; padding: 1.5rem; text-align: center; }
        header a { color: white; text-decoration: none; font-size: 1.5rem; font-weight: bold; }
        main { max-width: 1000px; margin: 2rem auto; background: white; padding: 2.5rem; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .chart-container { position: relative; margin: auto; height: 300px; width: 300px; }
        footer { text-align: center; padding: 2rem; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header><a href="{{ '/' | relative_url }}">日本国会議員データベース</a></header>
    <main>{{ content }}</main>
    <footer>&copy; 2026 日本国会議員データベース</footer>
</body>
</html>
